<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UtilHome Services</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app">
        <header>
            <h1>UtilHome Services</h1>
            <p>Book home services, manage account, pay with bank card or util coins.</p>
        </header>

        <div id="message" class="message"></div>

        <div id="auth-section" class="card">
            <div class="tabs">
                <button id="show-register">Register</button>
                <button id="show-login">Login</button>
            </div>
            <div id="register" class="form">
                <h2>Register</h2>
                <input id="reg-name" placeholder="Full name" />
                <input id="reg-email" placeholder="Email" type="email" />
                <input id="reg-phone" placeholder="Phone" />
                <input id="reg-password" placeholder="Password" type="password" />
                <select id="reg-role">
                    <option value="user">User</option>
                    <option value="provider">Service Provider</option>
                </select>
                <input id="reg-bank" placeholder="Bank account (optional)" />
                <button id="btn-register">Register & Generate OTP</button>
                <div class="subrow"><input id="otp-email" placeholder="Email for OTP" type="email" /><input
                        id="otp-code" placeholder="Enter OTP" /><button id="btn-verify-otp">Verify OTP</button></div>
            </div>
            <div id="login" class="form hidden">
                <h2>Login</h2>
                <input id="login-email" placeholder="Email" type="email" />
                <input id="login-password" placeholder="Password" type="password" />
                <button id="btn-login">Login</button>
                <div class="link" id="show-forgot">Forgot password?</div>
            </div>
            <div id="forgot" class="form hidden">
                <h2>Forgot password</h2>
                <input id="forgot-email" placeholder="Email" type="email" />
                <button id="btn-forgot">Send reset token</button>
                <input id="reset-token" placeholder="Reset token" />
                <input id="reset-password" placeholder="New password" type="password" />
                <button id="btn-reset">Reset password</button>
            </div>
        </div>

        <div id="dashboard" class="card hidden">
            <div class="top-row">
                <h2>Dashboard</h2><button id="btn-logout">Logout</button>
            </div>
            <div id="user-info"></div>
            <div id="service-row"></div>
            <div id="provider-row"></div>
            <div id="booking-row"></div>
            <div id="coins-row"></div>
            <div id="book-flight"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
